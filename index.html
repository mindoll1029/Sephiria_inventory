<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세피리아 빌드 시뮬레이터</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@noonnu/galmuri9@0.1.19/index.min.css">
  <style>
    :root {
      --bg:#17120f; --panel:#241c17; --panel2:#30261f; --slot:#1c1612;
      --text:#f7ead8; --muted:#bcae9c; --line:#49382d; --accent:#d69b55;
      --accent2:#f1cc83; --slate:#5fa5d9; --artifact:#b477ea; --shadow:0 18px 48px rgba(0,0,0,.33);
    }
    body.light {
      --bg:#f5efe5; --panel:#fff8ee; --panel2:#eadbc8; --slot:#fff3df;
      --text:#2d241e; --muted:#75675a; --line:#d5bea0; --accent:#b87b38;
      --accent2:#e6b96c; --shadow:0 14px 34px rgba(91,62,28,.15);
    }
    * { box-sizing:border-box; }
    html, body, button, input, select, textarea { font-family:"Galmuri9", system-ui, sans-serif; }
    body { margin:0; min-height:100vh; font-family:"Galmuri9", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:radial-gradient(circle at top left, rgba(214,155,85,.25), transparent 32%), linear-gradient(180deg,var(--bg),#0f0c0a); color:var(--text); }
    body.light { background:radial-gradient(circle at top left, rgba(230,185,108,.3), transparent 34%), linear-gradient(180deg,var(--bg),#e8dccd); }
    button,input,select,textarea { font:inherit; font-family:"Galmuri9", system-ui, sans-serif; }
    .app { width:min(1280px, calc(100% - 24px)); margin:0 auto; padding:14px 0 32px; }
    header { display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; margin-bottom:12px; }
    .brand { display:flex; gap:11px; align-items:center; min-width:220px; }
    .logo { width:54px; height:54px; border-radius:15px; background:var(--panel2); border:1px solid var(--line); box-shadow:var(--shadow); padding:5px; object-fit:contain; }
    h1 { margin:0; font-size:20px; line-height:1; font-weight:400; }
    .version { margin-top:5px; font-size:12px; color:var(--muted); }
    .tabs { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
    .tab,.btn { border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:999px; padding:8px 12px; cursor:pointer; }
    #helpBtn { width:30px; height:30px; padding:0; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:13px; line-height:1; }
    .tab.active,.btn.primary { background:var(--accent); color:#fff8eb; border-color:transparent; font-weight:400; }
    .actions { display:flex; gap:8px; justify-content:flex-end; }
    .notice { display:flex; justify-content:flex-end; align-items:center; padding:0; border:0; border-radius:0; background:transparent; box-shadow:none; color:var(--muted); margin-bottom:14px; font-size:14px; }
    .layout { display:grid; grid-template-columns:max-content 730px; gap:14px; align-items:start; justify-content:center; }
    .panel { border:1px solid var(--line); background:color-mix(in srgb,var(--panel) 96%, transparent); border-radius:22px; box-shadow:var(--shadow); overflow:hidden; }
    .panel-head { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:14px; border-bottom:1px solid var(--line); background:color-mix(in srgb,var(--panel2) 78%, transparent); }
    .panel-title { margin:0; font-size:17px; font-weight:950; }
    .panel-sub { margin:4px 0 0; color:var(--muted); font-size:12px; }
    .tag { display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:4px 8px; font-size:12px; white-space:nowrap; }
    .controls { display:grid; grid-template-columns:auto minmax(120px,1fr) auto; gap:8px; padding:14px; align-items:center; border-bottom:1px solid var(--line); background:color-mix(in srgb,var(--panel2) 78%, transparent); }
    .type-buttons { position:relative; display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--line); background:var(--slot); border-radius:14px; padding:3px; overflow:hidden; min-width:170px; }
    .type-buttons::before { content:""; position:absolute; top:3px; left:3px; width:calc((100% - 6px) / 2); height:calc(100% - 6px); border-radius:10px; background:var(--accent); transition:transform .18s ease; }
    .type-buttons[data-active="slate"]::before { transform:translateX(100%); }
    .type-btn { position:relative; z-index:1; border:0; background:transparent; color:var(--text); border-radius:10px; padding:10px 13px; cursor:pointer; white-space:nowrap; font-weight:400; }
    .type-btn.active { background:transparent; color:#fff8eb; border-color:transparent; font-weight:400; }
    .controls input, .controls select { width:100%; min-width:120px; border:1px solid var(--line); background:var(--slot); color:var(--text); border-radius:12px; padding:10px; outline:none; }
    .controls select { min-width:108px; cursor:pointer; }
    .priority-hint { grid-column:1 / -1; margin:0; color:var(--muted); font-size:12px; line-height:1.35; }
    .inventory { padding:14px; display:grid; grid-template-columns:repeat(8, minmax(0, 1fr)); gap:10px; max-height:690px; overflow:auto; scrollbar-width:none; -ms-overflow-style:none; }
    .inventory::-webkit-scrollbar { display:none; width:0; height:0; }
    .item-card { aspect-ratio:1; display:grid; place-items:center; border:1px solid var(--line); background:var(--slot); border-radius:16px; padding:6px; cursor:grab; user-select:none; transition:.12s; overflow:hidden; position:relative; }
    .item-card:hover { transform:translateY(-1px); border-color:var(--accent); }
    .item-card[data-rarity="common"], .slot[data-rarity="common"] { --rarity-color:#ffffff; }
    .item-card[data-rarity="competitive"], .slot[data-rarity="competitive"] { --rarity-color:#49A3F2; }
    .item-card[data-rarity="rare"], .slot[data-rarity="rare"] { --rarity-color:#F2B705; }
    .item-card[data-rarity="legendary"], .slot[data-rarity="legendary"] { --rarity-color:#F2059F; }
    .item-card[data-rarity] { border-color:color-mix(in srgb, var(--rarity-color) 72%, var(--line)); box-shadow:inset 0 0 0 2px color-mix(in srgb, var(--rarity-color) 28%, transparent); }
    .slot[data-rarity] { border-color:color-mix(in srgb, var(--rarity-color) 68%, var(--line)); }
    .item-card.priority, .slot.priority { outline:2px solid #ffef88; outline-offset:2px; }
    .item-card.priority::after, .slot.priority::before {
      content:"★"; position:absolute; left:4px; top:4px; min-width:17px; height:17px;
      display:inline-flex; align-items:center; justify-content:center; border-radius:6px;
      background:#ffef88; color:#24170b; font-size:11px; line-height:1; z-index:2;
      border:1px solid rgba(255,255,255,.38);
    }

    .slot.merge-source { outline:2px solid #7ee8ff; outline-offset:3px; }
    .merge-badge, .rotate-badge {
      position:absolute; z-index:4; height:18px; min-width:22px; padding:0 5px;
      display:inline-flex; align-items:center; justify-content:center; border-radius:6px;
      border:1px solid rgba(255,255,255,.35); font-size:10px; line-height:1; color:#24170b;
      pointer-events:none;
    }
    .merge-badge { left:4px; bottom:4px; background:#7ee8ff; }
    .rotate-badge { right:4px; top:4px; background:#d7b3ff; }
    .thumb { width:100%; height:100%; object-fit:contain; border-radius:12px; background:rgba(255,255,255,.05); border:0; padding:3px; display:block; }

    .item-card {
      aspect-ratio:auto;
      min-height:92px;
      grid-template-rows:1fr auto;
      gap:4px;
      padding:6px;
    }
    .item-card[data-id^="slate_"] { min-height:108px; }
    .item-card .thumb {
      width:100%;
      height:56px;
      max-height:64px;
      object-fit:contain;
    }
    .item-card > div, .item-card .tag { display:none; }

    .item-label {
      width:100%;
      min-height:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      border:1px solid var(--line);
      border-radius:8px;
      background:color-mix(in srgb,var(--panel) 80%, transparent);
      color:var(--text);
      font-size:11px;
      line-height:1.15;
      padding:3px 4px;
      overflow:hidden;
      text-overflow:ellipsis;
      word-break:keep-all;
    }
    .rotate-lock {
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid color-mix(in srgb,#ffb56b 65%,var(--line));
      border-radius:7px;
      background:rgba(255,181,107,.12);
      color:#ffce9a;
      font-size:10px;
      line-height:1;
      padding:3px 4px;
    }
    .item-card.no-rotate { box-shadow:inset 0 0 0 2px rgba(255,181,107,.25); }
    .item-name { font-weight:850; font-size:14px; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .item-desc { display:none; }
    .board-wrap { padding:16px; }
    .board-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
    .board-title { margin:0; font-size:22px; font-weight:400; }
    .board-guide { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .grid { --board-cell:72px; display:grid; grid-template-columns:repeat(6,var(--board-cell)); gap:9px; width:max-content; margin:0 auto; background-image:var(--board-shot, none); background-size:contain; background-position:center; background-repeat:no-repeat; }
    .grid.has-shot { border:1px solid var(--line); border-radius:24px; padding:10px; background-color:color-mix(in srgb,var(--panel2) 50%, transparent); }
    .slot { width:var(--board-cell); height:var(--board-cell); border:1px dashed color-mix(in srgb,var(--line) 70%, var(--accent)); background:color-mix(in srgb,var(--slot) 88%, transparent); border-radius:18px; display:grid; place-items:center; position:relative; padding:5px; overflow:hidden; }
    .slot:nth-child(6n+2),.slot:nth-child(6n+4) { transform:none; }
    .slot.empty::before { content:""; }
    .slot.over { border-color:var(--accent2); background:color-mix(in srgb,var(--accent) 16%, var(--slot)); }
    .placed { width:100%; height:100%; display:grid; place-items:center; border-radius:14px; background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 88%, transparent),color-mix(in srgb,var(--panel2) 90%, transparent)); cursor:pointer; padding:0; position:relative; }
    .level-badge { position:absolute; right:4px; top:4px; min-width:22px; height:18px; border-radius:6px; background:#ffef88; color:#25180a; border:1px solid rgba(255,255,255,.35); font-size:10px; display:inline-flex; align-items:center; justify-content:center; z-index:3; }
    .placed img { width:100%; height:100%; object-fit:contain; display:block; transition:transform .18s ease; transform-origin:center center; }
    .placed span { display:none; }
    .stats { padding:14px; display:grid; gap:10px; }
    .stat-line { display:grid; grid-template-columns:80px 1fr auto; align-items:center; gap:8px; font-size:13px; }
    .bar { height:9px; background:color-mix(in srgb,var(--line) 60%, transparent); border-radius:999px; overflow:hidden; }
    .bar i { display:block; height:100%; width:0; border-radius:inherit; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .2s; }
    .summary { padding:0 14px 14px; display:grid; gap:8px; }
    .summary-box,.code-box { border:1px solid var(--line); border-radius:14px; background:var(--slot); padding:10px; color:var(--muted); font-size:13px; line-height:1.45; word-break:break-all; }
    .library { padding:16px; display:none; }
    .library.active { display:block; }
    .library-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:10px; padding:14px; }
    .library-card { border:1px solid var(--line); border-radius:16px; background:var(--slot); padding:12px; display:grid; justify-items:center; gap:8px; text-align:center; min-height:142px; }
    .library-card img { width:58px; height:58px; object-fit:contain; }
    .library-card strong { font-size:13px; line-height:1.2; }
    .board-actions { display:flex; align-items:flex-start; justify-content:flex-end; gap:10px; flex-wrap:wrap; }
    .slot-control-wrap { display:grid; gap:4px; justify-items:center; width:158px; }
    .slot-controls { width:100%; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:6px; }
    .slot-btn { width:100%; height:34px; padding:0 16px; border-radius:10px; font-weight:1000; display:inline-flex; align-items:center; justify-content:center; }
    .slot-count { min-width:42px; height:34px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line); background:var(--slot); color:var(--text); border-radius:12px; font-weight:900; }
    .slot-caption { margin:0; color:var(--muted); font-size:13px; line-height:1.3; white-space:nowrap; }
    html, body { scrollbar-width:none; -ms-overflow-style:none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display:none; width:0; height:0; }

    .operate-wrap { margin-top:14px; display:grid; justify-items:center; }
    .operate-btn { width:min(260px, 100%); height:42px; border-radius:14px; border:1px solid var(--line); background:var(--accent); color:#fff8eb; cursor:pointer; }
    .slot.enhance-plus { border-style:solid; border-color:#6fe28f; box-shadow:0 0 0 2px rgba(111,226,143,.3), inset 0 0 18px rgba(111,226,143,.18); }
    .slot.enhance-minus { border-style:solid; border-color:#ff7777; box-shadow:0 0 0 2px rgba(255,119,119,.28), inset 0 0 18px rgba(255,119,119,.16); }
    .slot.enhance-core { border-style:solid; border-color:var(--accent2); box-shadow:0 0 0 2px rgba(241,204,131,.32), inset 0 0 18px rgba(241,204,131,.18); }
    .slot.enhance-plus::after,
    .slot.enhance-minus::after,
    .slot.enhance-core::after,
    .slot.enhance-ignore::after {
      position:absolute; right:5px; bottom:4px; min-width:18px; height:18px;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:6px; font-size:12px; line-height:1; color:#130f0c;
      background:#6fe28f; border:1px solid rgba(255,255,255,.28);
    }
    .slot.enhance-plus::after { content:"+"; }
    .slot.enhance-minus::after { content:"-"; background:#ff7777; color:#fff8eb; }
    .slot.enhance-core::after { content:"◆"; background:var(--accent2); }
    .slot.enhance-ignore::after { content:"무시"; background:#55cfd6; color:#06181a; }
    .slot.enhance-invalid::after { content:"!"; background:#ffb347; color:#24140a; }
    .slot.enhance-blocked::after { content:"×"; background:#9b7cff; color:#fff8eb; }
    .slot.enhance-plus { border-style:solid; border-color:#6fe28f; }
    .slot.enhance-minus { border-style:solid; border-color:#ff7777; }
    .slot.enhance-invalid { border-style:solid; border-color:#ffb347; }
    .slot.enhance-blocked { border-style:solid; border-color:#9b7cff; }
    .slot.enhance-ignore { border-style:solid; border-color:#55cfd6; box-shadow:0 0 0 2px rgba(85,207,214,.26), inset 0 0 18px rgba(85,207,214,.14); }
    .slot.enhance-max { border-style:solid; border-color:#ffef88; box-shadow:0 0 0 2px rgba(255,239,136,.38), inset 0 0 22px rgba(255,239,136,.22); }
    .slot.enhance-max::after { content:"MAX"; position:absolute; right:5px; bottom:4px; min-width:28px; height:18px; display:inline-flex; align-items:center; justify-content:center; border-radius:6px; font-size:10px; line-height:1; color:#24170b; background:#ffef88; border:1px solid rgba(255,255,255,.28); }
    .slot.enhance-suggest { border-style:dashed; border-color:var(--line); box-shadow:none; }
    .slot.enhance-suggest::after { content:none; display:none; }

    .item-card.priority::after, .slot.priority::before { display:none !important; content:none !important; }
    .priority-number-badge {
      position:absolute; right:4px; top:4px; width:22px; height:22px; padding:0;
      display:grid; place-items:center; text-align:center;
      border-radius:999px; background:#ffef88; color:#24170b;
      border:1px solid rgba(255,255,255,.45); font-size:11px; line-height:1; z-index:5;
      pointer-events:none; font-variant-numeric:tabular-nums;
    }
    .no-enhance-dot {
      position:absolute; left:5px; top:5px; width:16px; height:16px;
      display:inline-block; border-radius:999px; background:#ff3b3b;
      border:2px solid rgba(255,255,255,.78); box-shadow:0 0 0 1px rgba(0,0,0,.35);
      z-index:6; pointer-events:none;
    }
    .mode-buttons {
      grid-column:1 / -1; display:grid; grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:8px; align-items:center;
    }
    .mode-btn {
      border:1px solid var(--line); background:var(--slot); color:var(--text);
      border-radius:12px; padding:9px 10px; cursor:pointer; font-size:12px;
    }
    .mode-btn.active {
      background:var(--accent); color:#fff8eb; border-color:transparent;
      box-shadow:0 0 0 2px color-mix(in srgb,var(--accent2) 25%, transparent);
    }
    #banModeBtn.active { background:#b93333; color:#fff8eb; }
    #autoApplyBtn { background:color-mix(in srgb,var(--accent) 88%, #fff 0%); color:#fff8eb; }
    .level-badge {
      right:4px !important; top:auto !important; bottom:4px !important; min-width:30px; height:18px; padding:0 5px;
      display:inline-flex; align-items:center; justify-content:center; text-align:center;
      font-variant-numeric:tabular-nums; z-index:4;
    }

    .toast { position:fixed; right:18px; bottom:18px; max-width:360px; background:#16100c; color:#fff6e9; border:1px solid #3a2d23; border-radius:14px; padding:12px 14px; box-shadow:0 16px 36px rgba(0,0,0,.35); opacity:0; pointer-events:none; transform:translateY(10px); transition:.2s; z-index:20; }
    .toast.show { opacity:1; transform:translateY(0); }
    @media(max-width:1040px) { header { grid-template-columns:1fr; } .actions { justify-content:flex-start; } .layout { grid-template-columns:1fr; justify-content:stretch; } .inventory { max-height:360px; } .slot:nth-child(n) { transform:none; } }
    @media(max-width:1040px) { .controls { grid-template-columns:auto 1fr auto; } .inventory { grid-template-columns:repeat(8, minmax(0, 1fr)); } }
    @media(max-width:700px) { .inventory { grid-template-columns:repeat(6, minmax(0, 1fr)); } }
    @media(max-width:560px) { .app { width:calc(100% - 16px); } .notice,.board-toolbar { flex-direction:column; align-items:stretch; } .controls { grid-template-columns:1fr; } .controls input, .controls select { grid-column:1 / -1; } .type-buttons { display:grid; } .grid { --board-cell:64px; grid-template-columns:repeat(4,var(--board-cell)); gap:7px; } .tab,.btn { padding:7px 9px; font-size:13px; } #helpBtn { width:27px; height:27px; padding:0; } }

    /* v24 fix: 우측 목록은 상태 배지를 숨기고, 좌측 인벤토리 슬롯에만 상태를 표시합니다. */
    #inventory .priority-number-badge,
    #inventory .no-enhance-dot,
    #inventory .level-badge { display:none !important; }
    .placed .priority-number-badge {
      position:absolute; right:4px; top:4px; width:19px; height:19px;
      display:grid; place-items:center; border-radius:50%; background:#ffef88; color:#24170b;
      font-size:11px; line-height:1; border:1px solid rgba(255,255,255,.42); z-index:8;
    }
    .placed .no-enhance-dot {
      position:absolute; left:4px; top:4px; width:17px; height:17px;
      display:block; border-radius:50%; background:#ff4343; border:2px solid rgba(255,255,255,.65); z-index:8;
    }
    .placed .level-badge {
      position:absolute; right:4px; bottom:4px; top:auto; min-width:30px; height:18px;
      padding:0 5px; display:grid; place-items:center; border-radius:6px;
      background:#1a120d; color:#fff1dc; border:1px solid rgba(255,255,255,.35);
      font-size:10px; line-height:1; z-index:7;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img class="logo" src="assets/logo/sephiria.webp" alt="Sephiria logo" />
        <div><h1>세피리아 빌드 시뮬레이터</h1><div class="version">버전: 0.11.9</div></div>
      </div>
      <div class="actions"><button class="btn" id="themeBtn">Toggle theme</button><button class="btn" id="helpBtn">?</button></div>
    </header>
    <section class="notice"><button class="btn" id="clearBtn">전체 초기화</button></section>

    <main id="simulator" class="layout">
      <section class="panel board-panel">
        <div class="board-wrap">
          <div class="board-toolbar">
            <div>
              <h2 class="board-title">인벤토리</h2>
              <p class="board-guide">클릭 제거 / 석판 Shift+클릭 회전 / Ctrl+클릭 합성 원본 선택</p>
            </div>
            <div class="board-actions">
              <button class="btn" id="shotBtn">스크린샷 업로드</button>
              <input id="shotInput" type="file" accept="image/*" hidden />
              <div class="slot-control-wrap">
                <div class="slot-controls">
                  <button class="btn slot-btn" id="slotMinus" type="button">-</button>
                  <span id="slotCount" class="slot-count">34</span>
                  <button class="btn slot-btn" id="slotPlus" type="button">+</button>
                </div>
                <p class="slot-caption">최대 인벤토리 슬롯 설정</p>
              </div>
            </div>
          </div>
          <div id="board" class="grid"></div>
          <div class="operate-wrap"><button class="operate-btn" id="operateBtn" type="button">작동</button></div>
        </div>
      </section>
      <aside class="panel inventory-panel">
        <div class="controls" aria-label="인벤토리 분류와 검색">

        else out.push(v);
      };
      push(a); push(b);
      return out.length ? out : null;
    }
    function combinedSlateRule(index) {
      const components = slotComponents(index);
      const combined = { rotate:false, position:null, effect:{ ignoreArtifactRestrictions:false }, pattern:[], area:[] };
      let missing = 0;
      components.forEach(component=>{
        const rule = SLATE_RULES[component.id];
        if(!rule || ((!rule.pattern || rule.pattern.length === 0) && (!rule.area || rule.area.length === 0))) { missing++; return; }
        combined.position = mergeConstraints(combined.position, rule.position);
        combined.effect.ignoreArtifactRestrictions = combined.effect.ignoreArtifactRestrictions || !!(rule.effect && rule.effect.ignoreArtifactRestrictions);
        combined.pattern.push(...expandPatternWithRotation(rule.pattern || [], component.rotation || 0));
        combined.area.push(...expandAreaWithRotation(rule.area || [], component.rotation || 0));
      });
      return { rule:combined, missing, components };
    }
    function clearEnhancementMarks() {
      boardMarks = Array(board.length).fill(null);
      enhancementCounts = Array(board.length).fill(0);
    }
    function rowCount() {
      return Math.ceil(board.length / BOARD_COLUMNS);
    }
    function slotPosition(index) {
      return {
        row: Math.floor(index / BOARD_COLUMNS),
        col: index % BOARD_COLUMNS,
        rows: rowCount(),
        cols: BOARD_COLUMNS
      };
    }
    function checkPositionConstraint(index, constraint) {
      if(!constraint) return true;
      const { row, col, rows, cols } = slotPosition(index);
      const isTop = row === 0;
      const isBottom = row === rows - 1;
      const isLeft = col === 0;
      const isRight = col === cols - 1;
      const isEdge = isTop || isBottom || isLeft || isRight;
      const rules = Array.isArray(constraint) ? constraint : [constraint];
      return rules.every(rule => {
        if(rule === 'topRow') return isTop;
        if(rule === 'bottomRow') return isBottom;
        if(rule === 'inner') return !isEdge;
        if(rule === 'edge') return isEdge;
        if(rule === 'leftEdge') return isLeft;
        if(rule === 'rightEdge') return isRight;
        if(rule === 'notTopRow') return !isTop;
        if(rule === 'notBottomRow') return !isBottom;
        if(rule === 'notLeftEdge') return !isLeft;
        if(rule === 'notRightEdge') return !isRight;
        return true;
      });
    }
    function targetIndexFromOffset(originIndex, dr, dc) {
      const row=Math.floor(originIndex / BOARD_COLUMNS);
      const col=originIndex % BOARD_COLUMNS;
      const targetRow=row + dr;
      const targetCol=col + dc;
      if(targetRow < 0 || targetCol < 0 || targetCol >= BOARD_COLUMNS) return -1;
      const idx=targetRow * BOARD_COLUMNS + targetCol;
      return idx >= 0 && idx < board.length ? idx : -1;
    }
    function indicesForPattern(originIndex, pattern) {
      if(Array.isArray(pattern)) {
        return pattern.flatMap(offset => {
          if(offset && offset.special) {
            return indicesForPattern(originIndex, offset.special).map(target => ({ ...target, mark:offset.mark || target.mark || 'plus' }));
          }
          return [{
            index: targetIndexFromOffset(originIndex, offset.dr || 0, offset.dc || 0),
            mark: offset.mark || 'plus'
          }];
        }).filter(target => target.index >= 0);
      }

      const { row, col, rows, cols } = slotPosition(originIndex);
      if(pattern === 'bottomRow') {
        const start = (rows - 1) * cols;
        return Array.from({ length: cols }, (_, i) => ({ index: start + i, mark:'plus' }))
          .filter(target => target.index >= 0 && target.index < board.length && target.index !== originIndex);
      }
      if(pattern === 'topRow') {
        return Array.from({ length: cols }, (_, i) => ({ index: i, mark:'plus' }))
          .filter(target => target.index >= 0 && target.index < board.length && target.index !== originIndex);
      }
      if(pattern === 'sameRow') {
        const start = row * cols;
        return Array.from({ length: cols }, (_, i) => ({ index: start + i, mark:'plus' }))
          .filter(target => target.index >= 0 && target.index < board.length && target.index !== originIndex);
      }
      if(pattern === 'sameColumn') {
        return Array.from({ length: rows }, (_, r) => ({ index: r * cols + col, mark:'plus' }))
          .filter(target => target.index >= 0 && target.index < board.length && target.index !== originIndex);
      }
      return [];
    }
    function collectAreaTargets(originIndex, area) {
      if(!area) return [];
      const list = Array.isArray(area) ? area : [area];
      const { row, col, rows, cols } = slotPosition(originIndex);
      const targets = [];
      const add = (index, mark) => {
        if(index < 0 || index >= board.length || index === originIndex) return;
        targets.push({ index, mark:mark || 'plus' });
      };
      const addRow = (r, mark) => {
        for(let c = 0; c < cols; c++) add(r * cols + c, mark);
      };
      const addCol = (c, mark) => {
        for(let r = 0; r < rows; r++) add(r * cols + c, mark);
      };

      list.forEach(areaRule => {
        const rule = typeof areaRule === 'string' ? { type:areaRule, mark:'plus' } : areaRule;
        const type = rule.type;
        const mark = rule.mark || 'plus';

        if(type === 'sameRow') addRow(row, mark);
        else if(type === 'sameColumn') addCol(col, mark);
        else if(type === 'topRow') addRow(0, mark);
        else if(type === 'bottomRow') addRow(rows - 1, mark);
        else if(type === 'aboveColumn') { for(let r = 0; r < row; r++) add(r * cols + col, mark); }
        else if(type === 'belowColumn') { for(let r = row + 1; r < rows; r++) add(r * cols + col, mark); }
        else if(type === 'leftRow') { for(let c = 0; c < col; c++) add(row * cols + c, mark); }
        else if(type === 'rightRow') { for(let c = col + 1; c < cols; c++) add(row * cols + c, mark); }
        else if(type === 'aboveAll') { for(let r = 0; r < row; r++) addRow(r, mark); }
        else if(type === 'belowAll') { for(let r = row + 1; r < rows; r++) addRow(r, mark); }
        else if(type === 'leftAll') {
          for(let r = 0; r < rows; r++) for(let c = 0; c < col; c++) add(r * cols + c, mark);
        }
        else if(type === 'rightAll') {
          for(let r = 0; r < rows; r++) for(let c = col + 1; c < cols; c++) add(r * cols + c, mark);
        }
        else if(type === 'edge') {
          for(let r = 0; r < rows; r++) {
            for(let c = 0; c < cols; c++) {
              if(r === 0 || r === rows - 1 || c === 0 || c === cols - 1) add(r * cols + c, mark);
            }
          }
        }
        else if(type === 'inner') {
          for(let r = 1; r < rows - 1; r++) for(let c = 1; c < cols - 1; c++) add(r * cols + c, mark);
        }
        else if(type === 'diagonalDown') {
          for(let r = 0; r < rows; r++) {
            const c = col + (r - row);
            add(r * cols + c, mark);
          }
        }
        else if(type === 'diagonalUp') {
          for(let r = 0; r < rows; r++) {
            const c = col - (r - row);
            add(r * cols + c, mark);
          }
        }
        else if(type === 'diagonalBoth') {
          collectAreaTargets(originIndex, [
            { type:'diagonalDown', mark },
            { type:'diagonalUp', mark }
          ]).forEach(target => add(target.index, target.mark));
        }
        else if(type === 'around') {
          for(let dr = -1; dr <= 1; dr++) {
            for(let dc = -1; dc <= 1; dc++) {
              if(dr === 0 && dc === 0) continue;
              add(targetIndexFromOffset(originIndex, dr, dc), mark);
            }
          }
        }
        else if(type === 'all') {
          for(let i = 0; i < board.length; i++) add(i, mark);
        }
      });

      return targets;
    }
    function artifactCanReceiveEnhancement(itemId, targetIndex, slateRule) {
      const item = ITEMS.find(x => x.id === itemId);
      if(!item || item.type !== 'artifact') return { ok:true, reason:'' };
      if(noEnhanceTargets.has(item.id)) return { ok:false, reason:'no-enhance' };
      const artifactRule = ARTIFACT_RULES[item.id];
      if(!artifactRule) return { ok:true, reason:'' };
      if(slateRule && slateRule.effect && slateRule.effect.ignoreArtifactRestrictions) return { ok:true, reason:'ignored' };
      if(artifactRule.noSlateEnhance) return { ok:false, reason:'artifact-block' };
      if(artifactRule.position && !checkPositionConstraint(targetIndex, artifactRule.position)) return { ok:false, reason:'artifact-position' };
      return { ok:true, reason:'' };
    }

    function addEnhancementMark(index, mark) {
      if(index < 0 || index >= board.length) return;
      if(mark === 'plus') enhancementCounts[index] = Math.max(0, enhancementCounts[index] + 1);
      if(mark === 'minus') enhancementCounts[index] = Math.max(0, enhancementCounts[index] - 1);
      if(boardMarks[index] === 'blocked' || boardMarks[index] === 'invalid') return;
      if(mark === 'plus' || mark === 'minus' || mark === 'ignore') boardMarks[index] = mark;
    }
    function applyPriorityMaxMarks() {
      board.forEach((id,index)=>{
        const item=ITEMS.find(x=>x.id===id);
        if(!item || item.type !== 'artifact') return;
        if(!priorityTargets.has(id)) return;
        if(enhancementCounts[index] >= artifactMaxLevel(item)) boardMarks[index]='max';
        else if(enhancementCounts[index] > 0 && !boardMarks[index]) boardMarks[index]='plus';
      });
    }
    function markPrioritySuggestions() {
      // 인벤토리 칸의 "추천" 표시를 제거하기 위해 시각 표시를 만들지 않습니다.
      // 자동 배치는 getEnhancementPotential()을 따로 사용하므로 추천 표시가 없어도 작동합니다.
      return 0;
    }
    function calculateSlateEnhancements(showToast=false) {
      clearEnhancementMarks();
      let applied=0;
      let missing=0;
      let invalid=0;
      let blocked=0;
      board.forEach((id,index)=>{
        const it=ITEMS.find(x=>x.id===id);
        if(!it || it.type !== 'slate') return;
        const combined = combinedSlateRule(index);
        const rule = combined.rule;
        const hasRuleTargets = (rule.pattern && rule.pattern.length > 0) || (rule.area && rule.area.length > 0);
        if(combined.missing || !hasRuleTargets) { missing += combined.missing || 1; return; }

        if(rule.position && !checkPositionConstraint(index, rule.position)) {
          boardMarks[index]='invalid';
          invalid++;
          return;
        }

        boardMarks[index]='core';
        const targets = [
          ...indicesForPattern(index, rule.pattern || []),
          ...collectAreaTargets(index, rule.area || [])
        ];
        targets.forEach(target=>{
          const targetItemId = board[target.index];
          const receive = artifactCanReceiveEnhancement(targetItemId, target.index, rule);
          if(!receive.ok) {
            boardMarks[target.index]='blocked';
            blocked++;
            return;
          }
          addEnhancementMark(target.index, target.mark || 'plus');
          applied++;
        });
      });
      applyPriorityMaxMarks();
      const suggestions = markPrioritySuggestions();
      if(showToast) {
        if(applied || invalid || blocked || suggestions) {
          const parts=[];
          if(applied) parts.push('강화 '+applied+'칸');
          if(invalid) parts.push('위치 제약 불발 '+invalid+'개');
          if(blocked) parts.push('아티팩트 제약/강화 X 차단 '+blocked+'칸');
          const mergedCount = slotMeta.filter((meta,i)=>isSlateId(board[i]) && slotComponents(i).length > 1).length;
          if(mergedCount) parts.push('합성 석판 '+mergedCount+'개');
          const maxed = board.filter((id,i)=>{
            if(!id || !priorityTargets.has(id)) return false;
            return enhancementCounts[i] >= artifactMaxLevel(id);
          }).length;
          if(priorityTargets.size) parts.push('우선순위 MAX '+maxed+'개');
          toast(parts.join(' / '));
        } else if(missing) toast('석판별 강화 모양 데이터가 필요합니다');
        else toast('배치된 석판이 없습니다');
      }
      return { applied, missing, invalid, blocked, suggestions };
    }
    function applySlateEnhancements() {
      calculateSlateEnhancements(true);
      renderBoard();
      renderInventory();
      updateSlotCount();
    }

    function getEnhancementPotential() {
      const potential = Array(board.length).fill(0);
      board.forEach((id,index)=>{
        const it=ITEMS.find(x=>x.id===id);
        if(!it || it.type !== 'slate') return;
        const combined = combinedSlateRule(index);
        const rule = combined.rule;
        const hasRuleTargets = (rule.pattern && rule.pattern.length > 0) || (rule.area && rule.area.length > 0);
        if(!hasRuleTargets) return;
        if(rule.position && !checkPositionConstraint(index, rule.position)) return;
        const targets = [
          ...indicesForPattern(index, rule.pattern || []),
          ...collectAreaTargets(index, rule.area || [])
        ];
        targets.forEach(target=>{
          if(target.index < 0 || target.index >= potential.length) return;
          if(target.mark === 'plus' || target.mark === 'ignore') potential[target.index] += 1;
          else if(target.mark === 'minus') potential[target.index] -= 1;
        });
      });
      return potential;
    }
    function artifactAutoScore(artifactId, slotIndex, potential) {
      const value = potential[slotIndex] || 0;
      const maxLevel = artifactMaxLevel(artifactId);
      const useful = Math.max(0, Math.min(maxLevel, value));
      const rank = priorityRank(artifactId);
      if(noEnhanceTargets.has(artifactId)) {
        return (value <= 0 ? 500 : -10000 * value) - slotIndex / 1000;
      }
      let score = useful * 100;
      if(rank) score += useful * (12000 - rank * 900) + (maxLevel - useful) * -80;
      else score += useful * 160;
      if(value < 0) score += value * 300;
      return score - slotIndex / 1000;
    }
    function autoArrangeBoard() {
      const artifactEntries = [];
      const slateSlots = new Set();
      board.forEach((id,index)=>{
        const item=ITEMS.find(x=>x.id===id);
        if(!item) return;
        if(item.type === 'slate') slateSlots.add(index);
        else if(item.type === 'artifact') artifactEntries.push({ id, from:index });
      });
      if(!artifactEntries.length) return toast('자동 배치할 아티팩트가 없습니다');
      const candidateSlots = board.map((id,index)=>index).filter(index=>!slateSlots.has(index));
      const potential = getEnhancementPotential();
      const sortedArtifacts = artifactEntries.sort((a,b)=>{
        const ar = priorityRank(a.id) || 9999;
        const br = priorityRank(b.id) || 9999;
        if(ar !== br) return ar - br;
        const ax = noEnhanceTargets.has(a.id) ? 1 : 0;
        const bx = noEnhanceTargets.has(b.id) ? 1 : 0;
        if(ax !== bx) return ax - bx;
        return (ITEMS.find(x=>x.id===a.id)?.name || '').localeCompare(ITEMS.find(x=>x.id===b.id)?.name || '', 'ko');
      });

      candidateSlots.forEach(index=>{
        if(!slateSlots.has(index)) {
          board[index] = null;
          slotMeta[index] = emptySlotMeta();
        }
      });

      const available = [...candidateSlots];
      sortedArtifacts.forEach(entry=>{
        if(!available.length) return;
        let bestPos = 0;
        let bestScore = -Infinity;
        available.forEach((slotIndex, pos)=>{
          const score = artifactAutoScore(entry.id, slotIndex, potential);
          if(score > bestScore) {
            bestScore = score;
            bestPos = pos;
          }
        });
        const chosen = available.splice(bestPos, 1)[0];
        board[chosen] = entry.id;
        slotMeta[chosen] = emptySlotMeta();
      });

      mergeSourceIndex = null;
      selectedMergeSlate = null;
      update();
      renderInventory();
      toast('우선 순위와 강화 X를 반영해 자동 배치했습니다');
    }
    function update() { calculateSlateEnhancements(false); renderBoard(); renderInventory(); updateSlotCount(); }
    function syncRarityFilterState() {
      const select=$('#rarityFilter');
      if(!select) return;
      select.disabled = currentType !== 'slate';
      select.style.opacity = currentType === 'slate' ? '1' : '.45';
    }
    $('#searchInput').addEventListener('input',renderInventory);
    $('#rarityFilter').addEventListener('change',event=>{ currentRarity=event.target.value; renderInventory(); toast((rarityNames[currentRarity] || '등급')+' 필터 적용'); });
    $$('.type-btn').forEach(btn=>btn.addEventListener('click',()=>{
      currentType=btn.dataset.type;
      const group=btn.closest('.type-buttons');
      if(group) group.dataset.active=currentType;
      $$('.type-btn').forEach(b=>b.classList.toggle('active', b===btn));
      selected=null;
      syncRarityFilterState();
      renderInventory();
      toast(typeNames[currentType]+' 목록으로 변경되었습니다');
    }));
    $('#themeBtn').addEventListener('click',()=>document.body.classList.toggle('light'));
    $('#helpBtn').addEventListener('click',()=>toast('PC는 드래그, 모바일은 아이템 클릭 후 슬롯 클릭'));
    $('#clearBtn').addEventListener('click',()=>{ board.fill(null); boardMarks.fill(null); enhancementCounts.fill(0); slotMeta=Array.from({ length: board.length }, () => emptySlotMeta()); mergeSourceIndex=null; selectedMergeSlate=null; selected=null; priorityOrder.length=0; syncPriorityTargets(); noEnhanceTargets.clear(); selectMode='normal'; const pb=$('#priorityModeBtn'); const bb=$('#banModeBtn'); if(pb) pb.classList.remove('active'); if(bb) bb.classList.remove('active'); renderInventory(); update(); toast('초기화 완료'); });
    $('#slotMinus').addEventListener('click',()=>changeSlotCount(-1));
    $('#slotPlus').addEventListener('click',()=>changeSlotCount(1));
    $('#priorityModeBtn').addEventListener('click',()=>setSelectMode('priority'));
    $('#banModeBtn').addEventListener('click',()=>setSelectMode('ban'));
    $('#autoApplyBtn').addEventListener('click',autoArrangeBoard);
    $('#operateBtn').addEventListener('click',autoArrangeBoard);
    $('#shotBtn').addEventListener('click',()=>$('#shotInput').click());
    $('#shotInput').addEventListener('change',event=>{
      const file=event.target.files && event.target.files[0];
      if(!file) return;
      if(!file.type.startsWith('image/')) return toast('이미지 파일만 업로드할 수 있습니다');
      const reader=new FileReader();
      reader.addEventListener('load',()=>{
        const boardEl=$('#board');
        boardEl.style.setProperty('--board-shot', `url("${reader.result}")`);
        boardEl.classList.add('has-shot');
        toast('스크린샷을 인벤토리 보드에 적용했습니다');
      });
      reader.readAsDataURL(file);
    });
    syncRarityFilterState(); renderInventory(); update();
  </script>
</body>
</html>
