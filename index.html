<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세피리아 빌드 시뮬레이터</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@noonnu/galmuri9@0.1.19/index.min.css">
  <style>
    :root {
      --bg:#17120f; --panel:#241c17; --panel2:#30261f; --slot:#1c1612;
      --text:#f7ead8; --muted:#bcae9c; --line:#49382d; --accent:#d69b55;
      --accent2:#f1cc83; --slate:#5fa5d9; --artifact:#b477ea; --shadow:0 18px 48px rgba(0,0,0,.33);
    }
    body.light {
      --bg:#f5efe5; --panel:#fff8ee; --panel2:#eadbc8; --slot:#fff3df;
      --text:#2d241e; --muted:#75675a; --line:#d5bea0; --accent:#b87b38;
      --accent2:#e6b96c; --shadow:0 14px 34px rgba(91,62,28,.15);
    }
    * { box-sizing:border-box; }
    html, body, button, input, select, textarea { font-family:"Galmuri9", system-ui, sans-serif; }
    body { margin:0; min-height:100vh; font-family:"Galmuri9", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:radial-gradient(circle at top left, rgba(214,155,85,.25), transparent 32%), linear-gradient(180deg,var(--bg),#0f0c0a); color:var(--text); }
    body.light { background:radial-gradient(circle at top left, rgba(230,185,108,.3), transparent 34%), linear-gradient(180deg,var(--bg),#e8dccd); }
    button,input,select,textarea { font:inherit; font-family:"Galmuri9", system-ui, sans-serif; }
    .app { width:min(1280px, calc(100% - 24px)); margin:0 auto; padding:14px 0 32px; }
    header { display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; margin-bottom:12px; }
    .brand { display:flex; gap:11px; align-items:center; min-width:220px; }
    .logo { width:54px; height:54px; border-radius:15px; background:var(--panel2); border:1px solid var(--line); box-shadow:var(--shadow); padding:5px; object-fit:contain; }
    h1 { margin:0; font-size:20px; line-height:1; font-weight:400; }
    .version { margin-top:5px; font-size:12px; color:var(--muted); }
    .tabs { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
    .tab,.btn { border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:999px; padding:8px 12px; cursor:pointer; }
    #helpBtn { width:30px; height:30px; padding:0; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:13px; line-height:1; }
    .tab.active,.btn.primary { background:var(--accent); color:#fff8eb; border-color:transparent; font-weight:400; }
    .actions { display:flex; gap:8px; justify-content:flex-end; }
    .notice { display:flex; justify-content:flex-end; align-items:center; padding:0; border:0; border-radius:0; background:transparent; box-shadow:none; color:var(--muted); margin-bottom:14px; font-size:14px; }
    .layout { display:grid; grid-template-columns:max-content 730px; gap:14px; align-items:start; justify-content:center; }
    .panel { border:1px solid var(--line); background:color-mix(in srgb,var(--panel) 96%, transparent); border-radius:22px; box-shadow:var(--shadow); overflow:hidden; }
    .panel-head { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:14px; border-bottom:1px solid var(--line); background:color-mix(in srgb,var(--panel2) 78%, transparent); }
    .panel-title { margin:0; font-size:17px; font-weight:950; }
    .panel-sub { margin:4px 0 0; color:var(--muted); font-size:12px; }
    .tag { display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:4px 8px; font-size:12px; white-space:nowrap; }
    .controls { display:grid; grid-template-columns:auto 1fr; gap:8px; padding:14px; align-items:center; border-bottom:1px solid var(--line); background:color-mix(in srgb,var(--panel2) 78%, transparent); }
    .type-buttons { position:relative; display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--line); background:var(--slot); border-radius:14px; padding:3px; overflow:hidden; min-width:170px; }
    .type-buttons::before { content:""; position:absolute; top:3px; left:3px; width:calc((100% - 6px) / 2); height:calc(100% - 6px); border-radius:10px; background:var(--accent); transition:transform .18s ease; }
    .type-buttons[data-active="slate"]::before { transform:translateX(100%); }
    .type-btn { position:relative; z-index:1; border:0; background:transparent; color:var(--text); border-radius:10px; padding:10px 13px; cursor:pointer; white-space:nowrap; font-weight:400; }
    .type-btn.active { background:transparent; color:#fff8eb; border-color:transparent; font-weight:400; }
    .controls input { width:100%; min-width:120px; border:1px solid var(--line); background:var(--slot); color:var(--text); border-radius:12px; padding:10px; outline:none; }
    .inventory { padding:14px; display:grid; grid-template-columns:repeat(8, minmax(0, 1fr)); gap:10px; max-height:690px; overflow:auto; scrollbar-width:none; -ms-overflow-style:none; }
    .inventory::-webkit-scrollbar { display:none; width:0; height:0; }
    .item-card { aspect-ratio:1; display:grid; place-items:center; border:1px solid var(--line); background:var(--slot); border-radius:16px; padding:6px; cursor:grab; user-select:none; transition:.12s; overflow:hidden; }
    .item-card:hover { transform:translateY(-1px); border-color:var(--accent); }
    .thumb { width:100%; height:100%; object-fit:contain; border-radius:12px; background:rgba(255,255,255,.05); border:0; padding:3px; display:block; }
    .item-card > div, .item-card .tag { display:none; }
    .item-name { font-weight:850; font-size:14px; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .item-desc { display:none; }
    .board-wrap { padding:16px; }
    .board-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
    .board-title { margin:0; font-size:22px; font-weight:400; }
    .board-guide { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .grid { --board-cell:72px; display:grid; grid-template-columns:repeat(6,var(--board-cell)); gap:9px; width:max-content; margin:0 auto; background-image:var(--board-shot, none); background-size:contain; background-position:center; background-repeat:no-repeat; }
    .grid.has-shot { border:1px solid var(--line); border-radius:24px; padding:10px; background-color:color-mix(in srgb,var(--panel2) 50%, transparent); }
    .slot { width:var(--board-cell); height:var(--board-cell); border:1px dashed color-mix(in srgb,var(--line) 70%, var(--accent)); background:color-mix(in srgb,var(--slot) 88%, transparent); border-radius:18px; display:grid; place-items:center; position:relative; padding:5px; overflow:hidden; }
    .slot:nth-child(6n+2),.slot:nth-child(6n+4) { transform:none; }
    .slot.empty::before { content:""; }
    .slot.over { border-color:var(--accent2); background:color-mix(in srgb,var(--accent) 16%, var(--slot)); }
    .placed { width:100%; height:100%; display:grid; place-items:center; border-radius:14px; background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 88%, transparent),color-mix(in srgb,var(--panel2) 90%, transparent)); cursor:pointer; padding:0; }
    .placed img { width:100%; height:100%; object-fit:contain; display:block; }
    .placed span { display:none; }
    .stats { padding:14px; display:grid; gap:10px; }
    .stat-line { display:grid; grid-template-columns:80px 1fr auto; align-items:center; gap:8px; font-size:13px; }
    .bar { height:9px; background:color-mix(in srgb,var(--line) 60%, transparent); border-radius:999px; overflow:hidden; }
    .bar i { display:block; height:100%; width:0; border-radius:inherit; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .2s; }
    .summary { padding:0 14px 14px; display:grid; gap:8px; }
    .summary-box,.code-box { border:1px solid var(--line); border-radius:14px; background:var(--slot); padding:10px; color:var(--muted); font-size:13px; line-height:1.45; word-break:break-all; }
    .library { padding:16px; display:none; }
    .library.active { display:block; }
    .library-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:10px; padding:14px; }
    .library-card { border:1px solid var(--line); border-radius:16px; background:var(--slot); padding:12px; display:grid; justify-items:center; gap:8px; text-align:center; min-height:142px; }
    .library-card img { width:58px; height:58px; object-fit:contain; }
    .library-card strong { font-size:13px; line-height:1.2; }
    .board-actions { display:flex; align-items:flex-start; justify-content:flex-end; gap:10px; flex-wrap:wrap; }
    .slot-control-wrap { display:grid; gap:4px; justify-items:center; width:158px; }
    .slot-controls { width:100%; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:6px; }
    .slot-btn { width:100%; height:34px; padding:0 16px; border-radius:10px; font-weight:1000; display:inline-flex; align-items:center; justify-content:center; }
    .slot-count { min-width:42px; height:34px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line); background:var(--slot); color:var(--text); border-radius:12px; font-weight:900; }
    .slot-caption { margin:0; color:var(--muted); font-size:13px; line-height:1.3; white-space:nowrap; }
    html, body { scrollbar-width:none; -ms-overflow-style:none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display:none; width:0; height:0; }

    .operate-wrap { margin-top:14px; display:grid; justify-items:center; }
    .operate-btn { width:min(260px, 100%); height:42px; border-radius:14px; border:1px solid var(--line); background:var(--accent); color:#fff8eb; cursor:pointer; }
    .slot.enhance-plus { border-style:solid; border-color:#6fe28f; box-shadow:0 0 0 2px rgba(111,226,143,.3), inset 0 0 18px rgba(111,226,143,.18); }
    .slot.enhance-minus { border-style:solid; border-color:#ff7777; box-shadow:0 0 0 2px rgba(255,119,119,.28), inset 0 0 18px rgba(255,119,119,.16); }
    .slot.enhance-core { border-style:solid; border-color:var(--accent2); box-shadow:0 0 0 2px rgba(241,204,131,.32), inset 0 0 18px rgba(241,204,131,.18); }
    .slot.enhance-plus::after,
    .slot.enhance-minus::after,
    .slot.enhance-core::after {
      position:absolute; right:5px; bottom:4px; min-width:18px; height:18px;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:6px; font-size:12px; line-height:1; color:#130f0c;
      background:#6fe28f; border:1px solid rgba(255,255,255,.28);
    }
    .slot.enhance-plus::after { content:"+"; }
    .slot.enhance-minus::after { content:"-"; background:#ff7777; color:#fff8eb; }
    .slot.enhance-core::after { content:"◆"; background:var(--accent2); }
    .toast { position:fixed; right:18px; bottom:18px; max-width:360px; background:#16100c; color:#fff6e9; border:1px solid #3a2d23; border-radius:14px; padding:12px 14px; box-shadow:0 16px 36px rgba(0,0,0,.35); opacity:0; pointer-events:none; transform:translateY(10px); transition:.2s; z-index:20; }
    .toast.show { opacity:1; transform:translateY(0); }
    @media(max-width:1040px) { header { grid-template-columns:1fr; } .actions { justify-content:flex-start; } .layout { grid-template-columns:1fr; justify-content:stretch; } .inventory { max-height:360px; } .slot:nth-child(n) { transform:none; } }
    @media(max-width:1040px) { .controls { grid-template-columns:auto 1fr; } .inventory { grid-template-columns:repeat(8, minmax(0, 1fr)); } }
    @media(max-width:700px) { .inventory { grid-template-columns:repeat(6, minmax(0, 1fr)); } }
    @media(max-width:560px) { .app { width:calc(100% - 16px); } .notice,.board-toolbar { flex-direction:column; align-items:stretch; } .controls { grid-template-columns:1fr; } .controls input { grid-column:1 / -1; } .type-buttons { display:grid; } .grid { --board-cell:64px; grid-template-columns:repeat(4,var(--board-cell)); gap:7px; } .tab,.btn { padding:7px 9px; font-size:13px; } #helpBtn { width:27px; height:27px; padding:0; } }
  </style>
</head>

        <div><h1>세피리아 빌드 시뮬레이터</h1><div class="version">버전: 0.11.9</div></div>

            </div>
          </div>
          <div id="board" class="grid"></div>
          <div class="operate-wrap"><button class="operate-btn" id="operateBtn" type="button">작동</button></div>
        </div>
      </section>
      <aside class="panel inventory-panel">
        <div class="controls" aria-label="인벤토리 분류와 검색">

            <button class="type-btn" data-type="slate">석판</button>
          </div>
          <input id="searchInput" type="search" placeholder="검색" />
        </div>
        <div id="inventory" class="inventory"></div>
      </aside>
    </main>
  </div>

    const typeNames = { slate:'석판', artifact:'아티팩트' };
    const statMeta = [['power','화력'],['speed','속도'],['guard','방어'],['luck','행운']];
    let board = Array(initialBoardSize).fill(null);
    let boardMarks = Array(initialBoardSize).fill(null);
    let selected = null;
    let currentType = 'artifact';

    // 석판별 강화 모양 데이터가 들어가는 자리입니다.
    // 형식: 석판 id: [{ dr: 행 이동, dc: 열 이동, mark: 'plus' | 'minus' | 'core' }]
    // 예시:
    // const SLATE_PATTERNS = {
    //   slate_base: [{dr:0, dc:1, mark:'plus'}, {dr:1, dc:0, mark:'plus'}]
    // };
    const SLATE_PATTERNS = {};
    const BOARD_COLUMNS = 6;
    const $ = s => document.querySelector(s);
    const $$ = s => [...document.querySelectorAll(s)];
    function hash(s) { let h=0; for (let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0; return Math.abs(h); }
    function itemStats(item) { const h=hash(item.id); return { power:(h%9)+1, speed:(Math.floor(h/10)%8)+1, guard:(Math.floor(h/100)%7)+1, luck:(Math.floor(h/1000)%6)+1 }; }
    function toast(msg) { const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast.timer); toast.timer=setTimeout(()=>t.classList.remove('show'),1400); }
    function typeItems(type=currentType) { return ITEMS.filter(it => it.type===type); }
    function filteredItems() { const q=$('#searchInput').value.trim().toLowerCase(); return typeItems(currentType).filter(it => !q || it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q)); }
    function autoPlace(id) {
      const index = board.findIndex(slot => slot === null);
      if(index === -1) return toast('빈 인벤토리 칸이 없습니다');
      place(index, id);
    }
    function renderInventory() { const list=filteredItems(); $('#inventory').innerHTML=list.map(it=>`<div class="item-card" draggable="true" data-id="${it.id}" title="${it.name}"><img class="thumb" src="${it.image}" alt="${it.name}"></div>`).join(''); $$('.item-card').forEach(card=>{ card.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',card.dataset.id)); card.addEventListener('click',()=>autoPlace(card.dataset.id)); }); }
    function renderBoard() {
      $('#board').innerHTML=board.map((id,i)=>{
        const it=ITEMS.find(x=>x.id===id);
        const mark=boardMarks[i] ? ` enhance-${boardMarks[i]}` : '';
        if(!it) return `<div class="slot empty${mark}" data-i="${i}"></div>`;
        return `<div class="slot${mark}" data-i="${i}"><div class="placed" title="클릭하면 제거"><img src="${it.image}" alt="${it.name}"><span>${it.name}</span></div></div>`;
      }).join('');
      $$('.slot').forEach(slot=>{
        slot.addEventListener('dragover',e=>{e.preventDefault(); slot.classList.add('over');});
        slot.addEventListener('dragleave',()=>slot.classList.remove('over'));
        slot.addEventListener('drop',e=>{e.preventDefault(); slot.classList.remove('over'); place(+slot.dataset.i,e.dataTransfer.getData('text/plain'));});
        slot.addEventListener('click',()=>{ const i=+slot.dataset.i; if(board[i]) { const old=ITEMS.find(x=>x.id===board[i]); board[i]=null; boardMarks[i]=null; toast(old.name+' 제거'); update(); } });
      });
    }
    function place(i,id) { if(!ITEMS.some(x=>x.id===id)) return; board[i]=id; boardMarks[i]=null; const it=ITEMS.find(x=>x.id===id); toast((i+1)+'번 슬롯에 '+it.name+' 배치'); update(); }
    function totals() { const t={power:0,speed:0,guard:0,luck:0}, c={slate:0,artifact:0}; board.forEach(id=>{ const it=ITEMS.find(x=>x.id===id); if(!it) return; c[it.type]++; const s=itemStats(it); Object.keys(t).forEach(k=>t[k]+=s[k]); }); if(c.slate>=3) t.guard+=10; if(c.artifact>=3) t.power+=10; if(c.slate>=2 && c.artifact>=2) t.luck+=7; return {t,c}; }
    function updateSlotCount() { const countEl=$('#slotCount'); if(countEl) countEl.textContent=board.length; }
    function changeSlotCount(delta) {
      if(delta > 0) {
        if(board.length >= 80) return toast('최대 80칸까지 설정할 수 있습니다');
        board.push(null);
        boardMarks.push(null);
      } else {
        if(board.length <= 1) return toast('최소 1칸은 유지됩니다');
        const removed=board[board.length-1];
        board.pop();
        boardMarks.pop();
        if(removed) toast('마지막 칸의 아이템도 함께 제거되었습니다');
      }
      update();
    }

    function clearEnhancementMarks() {
      boardMarks = Array(board.length).fill(null);
    }
    function targetIndexFromOffset(originIndex, dr, dc) {
      const row=Math.floor(originIndex / BOARD_COLUMNS);
      const col=originIndex % BOARD_COLUMNS;
      const targetRow=row + dr;
      const targetCol=col + dc;
      if(targetRow < 0 || targetCol < 0 || targetCol >= BOARD_COLUMNS) return -1;
      const idx=targetRow * BOARD_COLUMNS + targetCol;
      return idx >= 0 && idx < board.length ? idx : -1;
    }
    function applySlateEnhancements() {
      clearEnhancementMarks();
      let applied=0;
      let missing=0;
      board.forEach((id,index)=>{
        const it=ITEMS.find(x=>x.id===id);
        if(!it || it.type !== 'slate') return;
        const pattern=SLATE_PATTERNS[id];
        if(!pattern || !pattern.length) { missing++; return; }
        boardMarks[index]='core';
        pattern.forEach(offset=>{
          const target=targetIndexFromOffset(index, offset.dr, offset.dc);
          if(target < 0) return;
          boardMarks[target]=offset.mark || 'plus';
          applied++;
        });
      });
      update();
      if(applied) toast('석판 강화 모양을 적용했습니다');
      else if(missing) toast('석판 강화 모양 데이터가 필요합니다');
      else toast('배치된 석판이 없습니다');
    }

    function update() { renderBoard(); updateSlotCount(); }
    $('#searchInput').addEventListener('input',renderInventory); $$('.type-btn').forEach(btn=>btn.addEventListener('click',()=>{ currentType=btn.dataset.type; const group=btn.closest('.type-buttons'); if(group) group.dataset.active=currentType; $$('.type-btn').forEach(b=>b.classList.toggle('active', b===btn)); selected=null; renderInventory(); toast(typeNames[currentType]+' 목록으로 변경되었습니다'); }));
    $('#themeBtn').addEventListener('click',()=>document.body.classList.toggle('light'));
    $('#helpBtn').addEventListener('click',()=>toast('PC는 드래그, 모바일은 아이템 클릭 후 슬롯 클릭'));
    $('#clearBtn').addEventListener('click',()=>{ board.fill(null); boardMarks.fill(null); selected=null; update(); toast('초기화 완료'); });
    $('#slotMinus').addEventListener('click',()=>changeSlotCount(-1));
    $('#slotPlus').addEventListener('click',()=>changeSlotCount(1));
    $('#operateBtn').addEventListener('click',applySlateEnhancements);
    $('#shotBtn').addEventListener('click',()=>$('#shotInput').click());
    $('#shotInput').addEventListener('change',event=>{
      const file=event.target.files && event.target.files[0];
      if(!file) return;
      if(!file.type.startsWith('image/')) return toast('이미지 파일만 업로드할 수 있습니다');
      const reader=new FileReader();
      reader.addEventListener('load',()=>{
        const boardEl=$('#board');
        boardEl.style.setProperty('--board-shot', `url("${reader.result}")`);
        boardEl.classList.add('has-shot');
        toast('스크린샷을 인벤토리 보드에 적용했습니다');
      });
      reader.readAsDataURL(file);
    });
    renderInventory(); update();
  </script>
</body>
</html>
